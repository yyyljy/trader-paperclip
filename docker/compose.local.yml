services:
  api:
    build:
      context: ..
      dockerfile: docker/api.Dockerfile
    environment:
      NODE_ENV: development
      APP_ENV: local
      APP_VERSION: 0.1.0
      HOST: 0.0.0.0
      PORT: 4000
      API_PUBLIC_BASE_URL: http://localhost:4000
      SSE_PUBLIC_BASE_URL: http://localhost:4000
    ports:
      - "4000:4000"
  worker:
    build:
      context: ..
      dockerfile: docker/worker.Dockerfile
    environment:
      NODE_ENV: development
      APP_ENV: local
      APP_VERSION: 0.1.0
      HOST: 0.0.0.0
      PORT: 4100
    ports:
      - "4100:4100"
  scheduler:
    build:
      context: ..
      dockerfile: docker/scheduler.Dockerfile
    environment:
      NODE_ENV: development
      APP_ENV: local
      APP_VERSION: 0.1.0
      HOST: 0.0.0.0
      PORT: 4200
    ports:
      - "4200:4200"
  web:
    build:
      context: ..
      dockerfile: docker/web.Dockerfile
    environment:
      VITE_APP_ENV: local
      VITE_APP_VERSION: 0.1.0
      VITE_API_BASE_URL: http://localhost:4000
      VITE_SSE_BASE_URL: http://localhost:4000
    ports:
      - "5173:5173"
    depends_on:
      - api
